<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Filter</title>
  <link rel="stylesheet" href="proj7.css">
</head>
<body>

  <div class="container">
    <h2>Product List</h2>

    <!-- Search Input -->
    <input 
      type="text" 
      id="searchBox" 
      placeholder="Search products..."
    />

    <!-- Product List -->
    <ul id="productList">
      <li class="product">Apple iPhone 15</li>
      <li class="product">Samsung Galaxy S24</li>
      <li class="product">Sony Headphones</li>
      <li class="product">Dell Laptop</li>
      <li class="product">HP Monitor</li>
      <li class="product">Redmi Note 13</li>
    </ul>
  </div>

  <script src="proj7.js"></script>
</body>
</html>
