<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Price Sorting</title>
  <link rel="stylesheet" href="proj8.css">
</head>
<body>

  <div class="container">
    <h2>Product Store</h2>

    <!-- Sorting Buttons -->
    <div class="buttons">
      <button onclick="sortLowToHigh()">Sort Low → High</button>
      <button onclick="sortHighToLow()">Sort High → Low</button>
    </div>

    <!-- Product List -->
    <ul id="productList">
      <li class="product" data-price="1200">Headphones - ₹1200</li>
      <li class="product" data-price="45000">Laptop - ₹45000</li>
      <li class="product" data-price="800">Mouse - ₹800</li>
      <li class="product" data-price="25000">Smartphone - ₹25000</li>
      <li class="product" data-price="1500">Keyboard - ₹1500</li>
    </ul>

  </div>

  <script src="proj8.js"></script>
</body>
</html>
